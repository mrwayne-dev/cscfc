<div class="receipt-page">

  <!-- ── State: Success ── -->
  <div class="receipt-card" id="stateSuccess" hidden>
    <div class="receipt-icon-wrap">
      <svg class="check-svg" viewBox="0 0 52 52" aria-hidden="true">
        <circle class="check-circle" cx="26" cy="26" r="25" fill="none"/>
        <path  class="check-mark"   fill="none" d="M14 27 l8 8 l16-18"/>
      </svg>
    </div>

    <h1 class="receipt-heading">Payment Confirmed</h1>
    <p class="receipt-sub" id="receiptSub">Your contribution has been recorded.</p>

    <div class="receipt-details">
      <div class="detail-row">
        <span class="detail-label">Player</span>
        <span class="detail-value" id="detailPlayer">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Amount Paid</span>
        <span class="detail-value highlight" id="detailAmount">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Reference</span>
        <span class="detail-value mono" id="detailRef">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Date</span>
        <span class="detail-value" id="detailDate">—</span>
      </div>
    </div>

    <!-- Remaining balance callout -->
    <div class="remaining-callout" id="remainingCallout" hidden>
      <i class="ph ph-info"></i>
      <span id="remainingText">You have a remaining balance.</span>
    </div>

    <div class="receipt-actions">
      <a href="/leaderboard" class="btn-receipt btn-primary">
        <i class="ph ph-trophy"></i>
        View Leaderboard
      </a>
      <a href="/" class="btn-receipt btn-ghost">
        Make Another Payment
      </a>
    </div>
  </div>

  <!-- ── State: Error ── -->
  <div class="receipt-card" id="stateError" hidden>
    <div class="receipt-icon-wrap error-wrap">
      <i class="ph ph-x-circle error-icon"></i>
    </div>

    <h1 class="receipt-heading">Payment Not Found</h1>
    <p class="receipt-sub" id="errorMsg">
      We couldn't verify this payment. It may still be processing.
    </p>

    <div class="receipt-actions">
      <a href="/" class="btn-receipt btn-primary">
        <i class="ph ph-arrow-left"></i>
        Back to Payment
      </a>
    </div>
  </div>

</div>
