<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSCFC — Redirecting…</title>
  <script>
    // Redirect old .html URL into the SPA, preserving the full path prefix.
    // e.g. /cscfc/leaderboard.html → stores '/cscfc/leaderboard', redirects to /cscfc/
    //      /leaderboard.html       → stores '/leaderboard',        redirects to /
    sessionStorage.setItem('spa-redirect', location.pathname.replace('.html', ''));
    location.replace(location.href.substring(0, location.href.lastIndexOf('/') + 1));
  </script>
</head>
<body></body>
</html>
