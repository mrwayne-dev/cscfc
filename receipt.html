<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSCFC — Redirecting…</title>
  <script>
    // Redirect old .html URL into the SPA, preserving the full path prefix.
    // e.g. /cscfc/receipt.html?ref=x → stores '/cscfc/receipt?ref=x', redirects to /cscfc/
    //      /receipt.html?ref=x       → stores '/receipt?ref=x',        redirects to /
    sessionStorage.setItem('spa-redirect', location.pathname.replace('.html', '') + location.search);
    location.replace(location.href.substring(0, location.href.lastIndexOf('/') + 1));
  </script>
</head>
<body></body>
</html>
